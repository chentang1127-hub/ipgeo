events { worker_connections 1024; }
http {
    include /etc/nginx/mime.types;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/html text/css text/javascript application/javascript application/json image/svg+xml;
    gzip_comp_level 5;

    # Resolver for proxying external domains
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    server {
        listen 80;
        server_name getipgeo.com www.getipgeo.com;
        root /app/docs;
        index index.html;

        location = /maxmind-alternative { return 301 /why-maxmind; }

        # Proxy Paddle.js CDN (China can't access cdn.paddle.com directly)
        location /paddle/ {
            proxy_pass https://cdn.paddle.com/paddle/;
            proxy_set_header Host cdn.paddle.com;
            proxy_set_header Accept-Encoding "";
            proxy_ssl_server_name on;
        }

        # Proxy Paddle Sandbox API
        location /paddle-api/ {
            proxy_pass https://sandbox-api.paddle.com/;
            proxy_set_header Host sandbox-api.paddle.com;
            proxy_ssl_server_name on;
        }

        # Proxy Paddle Sandbox CDN (CSS/JS assets for checkout UI)
        location /paddle-cdn/ {
            proxy_pass https://sandbox-cdn.paddle.com/;
            proxy_set_header Host sandbox-cdn.paddle.com;
            proxy_ssl_server_name on;
            proxy_set_header Accept-Encoding "";
        }

        # Proxy Paddle Sandbox Checkout (with URL rewriting for internal assets)
        location /paddle-checkout/ {
            proxy_pass https://sandbox-checkout.paddle.com/;
            proxy_set_header Host sandbox-checkout.paddle.com;
            proxy_ssl_server_name on;
            proxy_set_header Accept-Encoding "";
            sub_filter_once off;
            sub_filter_types text/html text/css application/javascript;
            sub_filter 'https://sandbox-cdn.paddle.com/' '/paddle-cdn/';
            sub_filter 'https://cdn.paddle.com/' '/paddle/';
            sub_filter 'https://sandbox-api.paddle.com/' '/paddle-api/';
        }

        # HTML pages: short cache so Cloudflare picks up changes quickly
        location ~ \.html$ {
            add_header Cache-Control "public, max-age=60";
        }

        location / {
            try_files $uri $uri.html $uri/ =404;
            # Static assets: cache 4 hours
            add_header Cache-Control "public, max-age=14400";
        }
    }

    server {
        listen 80;
        server_name api.getipgeo.com;
        location / {
            proxy_pass http://ipgeo:8000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }
    }
}
