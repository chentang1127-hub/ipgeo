<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up — IPGeo</title>
  <style>
    :root { --bg: #0a0a0f; --card: #13131a; --border: #252530; --text: #e4e4e7; --dim: #71717a; --accent: #7c3aed; --green: #10b981; --red: #ef4444; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .container { max-width: 480px; width: 100%; padding: 0 24px; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 40px 32px; }
    .logo { font-size: 1.5rem; font-weight: 700; color: #fff; text-align: center; margin-bottom: 32px; }
    .logo span { color: var(--accent); }
    h1 { color: #fff; font-size: 1.5rem; text-align: center; margin-bottom: 8px; }
    .subtitle { color: var(--dim); text-align: center; font-size: .9rem; margin-bottom: 32px; }
    label { display: block; color: var(--dim); font-size: .8rem; margin-bottom: 6px; text-transform: uppercase; letter-spacing: .05em; }
    input[type="email"] { width: 100%; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-size: .95rem; outline: none; transition: border-color .2s; }
    input[type="email"]:focus { border-color: var(--accent); }
    .plan-options { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 24px; }
    .plan-opt { background: var(--bg); border: 2px solid var(--border); border-radius: 8px; padding: 16px 12px; cursor: pointer; text-align: center; transition: border-color .2s; }
    .plan-opt:hover { border-color: var(--dim); }
    .plan-opt.selected { border-color: var(--accent); }
    .plan-opt .name { color: #fff; font-weight: 600; font-size: .9rem; }
    .plan-opt .price { color: var(--dim); font-size: .8rem; margin-top: 4px; }
    .plan-opt .badge { display: inline-block; font-size: .6rem; padding: 1px 6px; border-radius: 3px; margin-top: 4px; background: #064e3b; color: var(--green); }
    button { width: 100%; padding: 14px; background: var(--accent); color: #fff; border: none; border-radius: 6px; font-size: 1rem; font-weight: 600; cursor: pointer; transition: background .2s; }
    button:hover { background: #6d28d9; }
    button:disabled { opacity: .5; cursor: not-allowed; }
    .error { background: #3b0a0a; border: 1px solid var(--red); border-radius: 6px; padding: 12px; color: #fca5a5; font-size: .85rem; margin-bottom: 16px; display: none; }
    .spinner { display: none; width: 20px; height: 20px; border: 2px solid rgba(255,255,255,.2); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; margin-right: 10px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    button.loading .spinner { display: inline-block; }
    button.loading .btn-text { display: none; }
  </style>
</head>
<body>

<div class="container">
  <div class="logo"><a href="/" style="color:inherit;text-decoration:none;">IP<span>Geo</span></a></div>
  <div class="card">
    <h1>Get Your API Key</h1>
    <p class="subtitle">Choose a plan and enter your email to continue.</p>

    <div class="error" id="error"></div>

    <label>Plan</label>
    <div class="plan-options" id="plans">
      <div class="plan-opt" data-plan="free" data-price-id="pri_01kv753sk1wzebfa479gjtn3wa">
        <div class="name">🎉 Free</div>
        <div class="price">$0/mo · 10K queries</div>
      </div>
      <div class="plan-opt" data-plan="starter" data-price-id="pri_01kv756stsr32sg1jxkc0gd905">
        <div class="name">🚀 Starter</div>
        <div class="price">$9/mo · 100K queries</div>
      </div>
      <div class="plan-opt selected" data-plan="pro" data-price-id="pri_01kv7585xg3psf5bpbkpqh6hda">
        <div class="name">Pro 🎯</div>
        <div class="price">$29/mo · 500K queries</div>
        <div class="badge">GeoIP2</div>
      </div>
      <div class="plan-opt" data-plan="business" data-price-id="pri_01kv759mjz9q8zt34gngj7zda0">
        <div class="name">💼 Business</div>
        <div class="price">$79/mo · 1M queries</div>
        <div class="badge">GeoIP2</div>
      </div>
    </div>

    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" style="margin-bottom:24px;">

    <button id="submit" onclick="handleSubmit()">
      <span class="spinner"></span>
      <span class="btn-text">Continue to Payment</span>
    </button>
    <p style="text-align:center;color:var(--dim);font-size:.75rem;margin-top:16px;">
      Payment handled securely by Paddle. 7-day money-back guarantee.
    </p>
  </div>
</div>

<script src="https://cdn.paddle.com/paddle/v2/paddle.js"
  onerror="console.warn('Paddle CDN blocked, trying VPS proxy...');var s=document.createElement('script');s.src='/paddle/v2/paddle.js';document.head.appendChild(s);">
</script>
<script>
// ── Analytics ──
var _ANALYTICS = 'https://api.getipgeo.com/v1/analytics/event';
function _track(event, extra) {
  var payload = {event: event, page: location.pathname, referrer: document.referrer};
  if (extra) Object.assign(payload, extra);
  try { fetch(_ANALYTICS, {method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(payload)}).catch(function(){}); } catch(e) {}
}
_track('page_view');

// ── Paddle ──
Paddle.Environment.set('sandbox');
Paddle.Initialize({
  token: 'test_4628f082aee9e3ced4587817bdf',
  eventCallback: function(event) {
    console.log('Paddle event:', event.name, JSON.stringify(event.data || event, null, 2));
    if (event.name === 'checkout.error') {
      console.error('Paddle checkout error DETAILS:', event.data);
    }
    if (event.name === 'checkout.completed') {
      var txnId = (event.data && event.data.id) || '';
      window.location.href = '/success?checkout_id=' + encodeURIComponent(txnId);
    }
    if (event.name === 'checkout.closed') {
      var btn = document.getElementById('submit');
      btn.classList.remove('loading');
      btn.disabled = false;
    }
  },
});

let selectedPlan = 'pro';
let selectedPriceId = 'pri_01kv7585xg3psf5bpbkpqh6hda';

document.querySelectorAll('.plan-opt').forEach(function(el) {
  el.addEventListener('click', function() {
    document.querySelectorAll('.plan-opt').forEach(function(e) { e.classList.remove('selected'); });
    el.classList.add('selected');
    selectedPlan = el.dataset.plan;
    selectedPriceId = el.dataset.priceId;
  });
});

// Pre-select plan from URL ?plan=xxx
(function() {
  var params = new URLSearchParams(window.location.search);
  var urlPlan = params.get('plan');
  if (urlPlan) {
    var match = document.querySelector('.plan-opt[data-plan="' + urlPlan + '"]');
    if (match) {
      document.querySelectorAll('.plan-opt').forEach(function(e) { e.classList.remove('selected'); });
      match.classList.add('selected');
      selectedPlan = match.dataset.plan;
      selectedPriceId = match.dataset.priceId;
    }
  }
})();

function showError(msg) {
  var el = document.getElementById('error');
  el.textContent = msg;
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('error').style.display = 'none';
}

async function handleSubmit() {
  hideError();
  var email = document.getElementById('email').value.trim();
  if (!email || email.indexOf('@') === -1) {
    showError('Please enter a valid email address.');
    return;
  }

  _track('signup_start', {plan: selectedPlan});

  var btn = document.getElementById('submit');
  btn.classList.add('loading');
  btn.disabled = true;

  try {
    // Free plan — skip checkout, create key directly
    if (selectedPlan === 'free') {
      _track('signup_complete', {plan: 'free'});
      var resp = await fetch('https://api.getipgeo.com/v1/auth/register-free', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email }),
      });
      if (!resp.ok) {
        var err = await resp.json();
        throw new Error(err.detail || 'Registration failed');
      }
      var data = await resp.json();
      sessionStorage.setItem('ipgeo_api_key', data.api_key);
      sessionStorage.setItem('ipgeo_plan', data.plan);
      window.location.href = '/success?plan=' + data.plan + '&key_ready=1';
      return;
    }

    // Paid plan — register user, then open Paddle.js checkout
    resp = await fetch('https://api.getipgeo.com/v1/auth/register', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email: email, price_id: selectedPriceId }),
    });
    if (!resp.ok) {
      err = await resp.json();
      throw new Error(err.detail || 'Registration failed');
    }
    data = await resp.json();

    console.log('Opening Paddle checkout for user:', data.user_id, 'price:', selectedPriceId);

    // Open Paddle checkout overlay
    Paddle.Checkout.open({
      items: [{ priceId: selectedPriceId, quantity: 1 }],
      customer: { email: email },
      customData: { user_id: data.user_id },
      settings: {
        displayMode: 'overlay',
        theme: 'dark',
        successUrl: 'https://getipgeo.com/success?checkout_id={checkout_id}',
      },
    });
  } catch (e) {
    console.error('Checkout error:', e);
    showError(e.message || 'Something went wrong. Please try again.');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}
</script>

</body>
</html>
