services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis_data:/data

  ipgeo:
    build: .
    restart: unless-stopped
    environment:
      IPGEO_HOST: "0.0.0.0"
      IPGEO_PORT: "8000"
      IPGEO_WORKERS: "4"
      IPGEO_REDIS_URL: "redis://redis:6379/0"
      IPGEO_CITY_DB_PATH: "/app/data/GeoLite2-City.mmdb"
      IPGEO_ASN_DB_PATH: "/app/data/GeoLite2-ASN.mmdb"
      IPGEO_MAXMIND_LICENSE_KEY: "${IPGEO_MAXMIND_LICENSE_KEY:-}"
      IPGEO_ADMIN_TOKEN: "${IPGEO_ADMIN_TOKEN:-change-me}"
      IPGEO_PADDLE_SANDBOX: "${IPGEO_PADDLE_SANDBOX:-true}"
      IPGEO_PADDLE_API_KEY: "${IPGEO_PADDLE_API_KEY:-}"
      IPGEO_PADDLE_WEBHOOK_SECRET: "${IPGEO_PADDLE_WEBHOOK_SECRET:-}"
    volumes:
      - ./data:/app/data
    depends_on:
      redis:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs:/app/docs:ro
    depends_on:
      - ipgeo

volumes:
  redis_data:
